<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUK Smart ID | My ID Dashboard</title>
    <meta name="description" content="TUK Smart ID Student Dashboard — view your fee clearance status and access history.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .tuk-green { background-color: #006400; }
        .text-tuk-green { color: #006400; }
        .border-tuk-green { border-color: #006400; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .animate-reveal { animation: slideUp 0.35s ease-out forwards; }

        @keyframes pulse-badge {
            0%, 100% { transform: scale(1); }
            50%       { transform: scale(1.06); }
        }
        .pulse-badge { animation: pulse-badge 2s ease-in-out infinite; }
        
        /* Table styles */
        table { border-collapse: collapse; width: 100%; }
        th, td { padding: 0.75rem 1rem; border-bottom: 1px solid #e5e7eb; }
        th { background-color: #f9fafb; font-weight: 600; text-transform: uppercase; font-size: 0.75rem; color: #6b7280; letter-spacing: 0.05em; }
        tbody tr:hover { background-color: #f9fafb; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800">

    <!-- ── HEADER ─────────────────────────────────────────────────── -->
    <header class="bg-white border-b-4 border-green-700 shadow-md">
        <div class="max-w-4xl mx-auto px-4 py-3 flex flex-col sm:flex-row justify-between items-center gap-3">
            <div class="flex items-center gap-4">
                <img src="https://www.tukenya.ac.ke/sites/default/files/logo_0.png"
                     alt="TUK Logo" class="h-16 w-auto">
                <div>
                    <h1 class="text-xl sm:text-2xl font-extrabold text-green-700 uppercase tracking-tight leading-tight">
                        Technical University of Kenya
                    </h1>
                    <p class="text-[11px] font-semibold text-gray-400 uppercase tracking-widest">My ID Dashboard</p>
                    <div class="flex items-center gap-3 mt-0.5">
                        <button onclick="logout()"
                                class="text-xs font-semibold text-red-500 hover:text-red-700 underline transition-colors">
                            Sign Out
                        </button>
                    </div>
                </div>
            </div>
            <div class="text-center sm:text-right">
                <div id="clock" class="text-2xl font-bold text-gray-700 tabular-nums">00:00:00</div>
                <p id="current-date" class="text-[11px] font-bold text-green-700 uppercase tracking-widest mt-0.5"></p>
            </div>
        </div>
    </header>

    <!-- ── MAIN ───────────────────────────────────────────────────── -->
    <main class="max-w-4xl mx-auto px-4 py-8 space-y-6">

        <!-- Error Msg Container (if student fetch fails) -->
        <div id="errorDisplay" class="hidden p-4 rounded-lg bg-red-50 border border-red-300 text-red-700 text-sm font-semibold">
        </div>

        <!-- Loading state -->
        <div id="loadingState" class="text-center py-12">
            <p class="text-gray-500 font-semibold animate-pulse">Loading profile...</p>
        </div>

        <!-- Profile card -->
        <section id="profileSection" class="hidden animate-reveal space-y-6">

            <!-- ID Card -->
            <div class="bg-white rounded-xl shadow-md border border-gray-200 overflow-hidden">
                <div class="bg-gray-100 border-b border-gray-200 px-6 py-4 flex justify-between items-center">
                    <h2 class="text-gray-800 font-bold uppercase tracking-wider text-sm">📋 Student Profile</h2>
                    <span class="text-green-700 text-[10px] font-bold uppercase tracking-widest flex items-center gap-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        NFC Smart ID
                    </span>
                </div>

                <div class="p-6 flex flex-col sm:flex-row items-start sm:items-center gap-6">
                    <!-- Avatar -->
                    <div class="w-24 h-24 rounded-full bg-green-50 border-4 border-green-600 flex items-center justify-center text-4xl flex-shrink-0 shadow-sm">
                        🎓
                    </div>
                    <!-- Details -->
                    <div class="flex-1 space-y-1">
                        <h3 id="studentName" class="text-2xl font-extrabold text-gray-800 uppercase"></h3>
                        <p id="studentReg" class="text-sm font-bold text-gray-600"></p>
                        <p id="studentProgram" class="text-xs font-semibold text-gray-500"></p>
                        <div class="pt-2">
                            <span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-md bg-gray-100 text-[10px] font-mono text-gray-600 border border-gray-200">
                                <svg class="w-3 h-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                                UID: <span id="nfcUid"></span>
                            </span>
                        </div>
                    </div>
                    <!-- Fee Status Badge -->
                    <div class="flex-shrink-0 text-center sm:text-right mt-4 sm:mt-0 w-full sm:w-auto">
                        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Fee Status</p>
                        <span id="feeStatus"
                              class="pulse-badge inline-block px-5 py-2 rounded-full text-sm font-black uppercase shadow-sm">
                        </span>
                    </div>
                </div>
            </div>

            <!-- Access History Table -->
            <div class="bg-white rounded-xl shadow-md border border-gray-200 overflow-hidden">
                <div class="bg-gray-100 border-b border-gray-200 px-6 py-4 flex justify-between items-center">
                    <h2 class="text-gray-800 font-bold uppercase text-sm tracking-wider">🕐 Access History</h2>
                    <span id="tapCount" class="text-[10px] font-black text-gray-500 uppercase bg-white border border-gray-200 px-2 py-1 rounded-full shadow-sm"></span>
                </div>
                
                <div class="overflow-x-auto max-h-80">
                    <table class="w-full text-left text-sm whitespace-nowrap">
                        <thead class="sticky top-0 shadow-sm z-10">
                            <tr>
                                <th>Date & Time</th>
                                <th>Facility</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="tapsList">
                            <!-- Rows injected by JS -->
                        </tbody>
                    </table>
                </div>
                <div class="px-4 py-3 bg-gray-50 border-t border-gray-200 text-[10px] text-gray-400 font-bold uppercase text-center tracking-widest">
                    Showing last 15 tap records
                </div>
            </div>

        </section>

    </main>

    <footer class="text-center py-6 text-[11px] text-gray-400 font-medium uppercase tracking-widest">
        TUK Smart ID System &copy; 2026 — Technical University of Kenya
    </footer>

    <script>
        // ─── API Configuration ────────────────────────────────────────────────
        const API_BASE = 'https://designing-a-smart-id-for-tuk-students.onrender.com'; // local: 'http://localhost:3000'
        // ─────────────────────────────────────────────────────────────────────

        // Live clock
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
            document.getElementById('current-date').innerText = now.toLocaleDateString('en-GB', {
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
            });
        }
        updateClock();
        setInterval(updateClock, 1000);

        // ── Auth guard: redirect to login if no session ───────────────────
        window.onload = () => {
            const savedReg = sessionStorage.getItem('regNumber');
            if (!savedReg) {
                // Not logged in — redirect to login page
                window.location.href = 'index.html';
                return;
            }
            // Auto-load this student's profile
            lookupStudent(savedReg);
        };

        function logout() {
            sessionStorage.clear();
            window.location.href = 'index.html';
        }

        async function lookupStudent(regNumber) {
            const errorDisplay = document.getElementById('errorDisplay');
            const profileSection = document.getElementById('profileSection');
            const loadingState = document.getElementById('loadingState');

            try {
                const res  = await fetch(`${API_BASE}/student/${encodeURIComponent(regNumber)}`);
                const data = await res.json();

                if (res.ok) {
                    displayProfile(data, regNumber);
                    loadingState.classList.add('hidden');
                    errorDisplay.classList.add('hidden');
                } else {
                    loadingState.classList.add('hidden');
                    errorDisplay.innerText = data.error === 'Student not found'
                        ? '⚠️ Student not found. Please check your registration number.'
                        : `⚠️ Error: ${data.error || 'Unknown error'}`;
                    errorDisplay.classList.remove('hidden');
                }
            } catch (err) {
                console.error('Connection Error:', err);
                loadingState.classList.add('hidden');
                errorDisplay.innerText = '⚠️ Connection Error. Please ensure the backend is live.';
                errorDisplay.classList.remove('hidden');
            }
        }

        function displayProfile(data, regNumber) {
            document.getElementById('studentName').innerText = data.name || 'Unknown';
            document.getElementById('studentReg').innerText  = regNumber;
            document.getElementById('studentProgram').innerText = data.program || 'Not Assigned';
            document.getElementById('nfcUid').innerText = data.nfc_uid || 'N/A';

            // fee_status
            const feeStatus = document.getElementById('feeStatus');
            if (data.fee_status === true) {
                feeStatus.innerText   = '✅ Cleared';
                feeStatus.className   = 'pulse-badge inline-block px-5 py-2 rounded-full text-sm font-black uppercase bg-green-100 text-green-800 border-2 border-green-600 shadow-sm';
            } else {
                feeStatus.innerText   = '⏳ Pending';
                feeStatus.className   = 'pulse-badge inline-block px-5 py-2 rounded-full text-sm font-black uppercase bg-red-100 text-red-800 border-2 border-red-600 shadow-sm';
            }

            // Access history
            const tapsList = document.getElementById('tapsList');
            const tapCount = document.getElementById('tapCount');

            if (data.logs && data.logs.length > 0) {
                tapCount.innerText = `${data.logs.length} record${data.logs.length !== 1 ? 's' : ''}`;
                tapsList.innerHTML = data.logs.map(log => {
                    const isGranted = log.status === 'Access Granted';
                    const dateStr = new Date(log.access_time).toLocaleString('en-GB', {
                        day: '2-digit', month: 'short', year: 'numeric',
                        hour: '2-digit', minute: '2-digit'
                    });
                    
                    const statusBadge = isGranted 
                        ? `<span class="px-3 py-1 rounded-full text-[10px] font-bold bg-green-100 text-green-700 border border-green-300">GRANTED</span>`
                        : `<span class="px-3 py-1 rounded-full text-[10px] font-bold bg-red-100 text-red-700 border border-red-300">DENIED</span>`;

                    return `
                        <tr class="transition-colors border-b border-gray-100 last:border-0 hover:bg-gray-50">
                            <td class="text-xs text-gray-600 font-medium">${dateStr}</td>
                            <td class="text-xs font-semibold text-gray-800">${log.facility || 'Main Gate'}</td>
                            <td>${statusBadge}</td>
                        </tr>
                    `;
                }).join('');
            } else {
                tapCount.innerText = '0 records';
                tapsList.innerHTML = `<tr><td colspan="3" class="text-center text-gray-400 italic text-sm py-6">No access records yet.</td></tr>`;
            }

            document.getElementById('profileSection').classList.remove('hidden');
        }
    </script>
</body>
</html>
