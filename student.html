<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUK Smart ID | Student Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .tuk-green { background-color: #006400; }
        .text-tuk-green { color: #006400; }
        .border-tuk-green { border-color: #006400; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-reveal { animation: slideUp 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800">

    <header class="bg-white border-b-4 border-tuk-green shadow-md mb-8">
        <div class="max-w-6xl mx-auto px-4 py-3 flex flex-col md:flex-row justify-between items-center">
            <div class="flex items-center gap-4">
                <img src="https://www.tukenya.ac.ke/sites/default/files/logo_0.png" alt="TUK Logo" class="h-20 w-auto">
                <div>
                    <h1 class="text-2xl md:text-3xl font-bold text-tuk-green uppercase tracking-tight">Technical University of Kenya</h1>
                    <p class="text-sm font-semibold text-gray-500 uppercase tracking-widest">Student Portal</p>
                </div>
            </div>
            <div class="text-center md:text-right mt-4 md:mt-0">
                <div id="clock" class="text-2xl font-bold text-gray-700">00:00:00</div>
                <p id="current-date" class="text-xs font-bold text-tuk-green uppercase">Saturday, May 9, 2026</p>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 pb-12">

        <section class="mb-8">
            <div class="bg-white rounded-lg shadow-lg overflow-hidden border border-gray-200">
                <div class="tuk-green p-4">
                    <h2 class="text-white font-bold uppercase tracking-wider flex items-center gap-2">
                        <span>🔍</span> Student Profile Lookup
                    </h2>
                </div>

                <div class="p-8">
                    <div class="mb-6">
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Enter Your Registration Number</label>
                        <input type="text" id="regInput" placeholder="e.g., AIIM/00476/2021"
                               class="w-full bg-gray-50 border-2 border-gray-300 rounded p-4 text-lg focus:border-tuk-green focus:ring-0 transition-all outline-none">
                    </div>

                    <button onclick="lookupStudent()"
                            class="w-full tuk-green text-white py-4 rounded font-bold text-lg uppercase hover:bg-green-800 transition-colors shadow-md">
                        View My Profile
                    </button>

                    <div id="errorDisplay" class="hidden mt-4 p-4 rounded-lg border-2 border-red-600 bg-red-50 text-center text-red-700 font-bold">
                        Student not found. Please check your registration number.
                    </div>
                </div>
            </div>
        </section>

        <section id="profileSection" class="hidden">
            <div class="bg-white rounded-lg shadow-lg overflow-hidden border border-gray-200 mb-8">
                <div class="tuk-green p-4">
                    <h2 class="text-white font-bold uppercase tracking-wider flex items-center gap-2">
                        <span>👤</span> Student Profile
                    </h2>
                </div>

                <div class="p-8">
                    <div class="flex flex-col md:flex-row items-center md:items-start gap-6">
                        <div class="flex-1 text-center md:text-left">
                            <h3 id="studentName" class="text-3xl font-bold text-gray-800 uppercase mb-2"></h3>
                            <p id="studentReg" class="text-lg font-semibold text-gray-500 mb-4"></p>
                            <div class="inline-block">
                                <span id="feeStatus" class="px-4 py-2 rounded-full text-sm font-bold uppercase"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow-lg border border-gray-200">
                <div class="bg-gray-100 border-b border-gray-200 p-4">
                    <h2 class="text-tuk-green font-bold uppercase text-sm">My Recent Taps</h2>
                </div>

                <div id="tapsList" class="p-4 space-y-3 max-h-[500px] overflow-y-auto">
                    <p class="text-center text-gray-400 italic text-sm py-10">No taps found.</p>
                </div>
            </div>
        </section>

    </main>

    <script>
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);

        async function lookupStudent() {
            const regInput = document.getElementById('regInput');
            const regNumber = regInput.value.trim();
            if (!regNumber) return;

            try {
                const res = await fetch(`http://localhost:3000/student/${encodeURIComponent(regNumber)}`);
                const data = await res.json();

                if (res.ok) {
                    displayProfile(data);
                    document.getElementById('errorDisplay').classList.add('hidden');
                } else {
                    document.getElementById('errorDisplay').classList.remove('hidden');
                    document.getElementById('profileSection').classList.add('hidden');
                }
            } catch (err) {
                console.error("Connection Error:", err);
                document.getElementById('errorDisplay').classList.remove('hidden');
                document.getElementById('profileSection').classList.add('hidden');
            }
        }

        function displayProfile(data) {
            document.getElementById('studentName').innerText = data.name;
            document.getElementById('studentReg').innerText = 'Registration: ' + regInput.value.trim();

            const feeStatus = document.getElementById('feeStatus');
            if (data.fee_status === 1) {
                feeStatus.innerText = 'Cleared';
                feeStatus.className = 'px-4 py-2 rounded-full text-sm font-bold uppercase bg-green-100 text-green-800 border border-green-600';
            } else {
                feeStatus.innerText = 'Pending';
                feeStatus.className = 'px-4 py-2 rounded-full text-sm font-bold uppercase bg-red-100 text-red-800 border border-red-600';
            }

            const tapsList = document.getElementById('tapsList');
            if (data.logs.length > 0) {
                tapsList.innerHTML = data.logs.map(log => `
                    <div class="flex items-center justify-between p-3 rounded bg-gray-50 border-l-4 ${log.status === 'Access Granted' ? 'border-green-600' : 'border-red-600'}">
                        <div>
                            <p class="text-[10px] font-bold text-tuk-green">${new Date(log.access_time).toLocaleString()}</p>
                        </div>
                        <span class="text-[10px] font-black px-2 py-1 rounded border ${log.status === 'Access Granted' ? 'border-green-600 text-green-600' : 'border-red-600 text-red-600'} uppercase">
                            ${log.status === 'Access Granted' ? 'Granted' : 'Denied'}
                        </span>
                    </div>
                `).join('');
            } else {
                tapsList.innerHTML = '<p class="text-center text-gray-400 italic text-sm py-10">No taps found.</p>';
            }

            document.getElementById('profileSection').classList.remove('hidden');
        }
    </script>

</body>
</html>
