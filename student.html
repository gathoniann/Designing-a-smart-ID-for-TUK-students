<script>
        // ─── API Configuration ────────────────────────────────────────────────
        // Change this one line to switch between local dev and deployed backend
        const API_BASE = 'https://designing-a-smart-id-for-tuk-students.onrender.com'; // local: 'http://localhost:3000'
        // ─────────────────────────────────────────────────────────────────────
        // Update the clock every second
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);

        // Auto-fill registration number if student logged in via index.html
        window.onload = () => {
            const savedReg = sessionStorage.getItem('regNumber');
            if (savedReg) {
                document.getElementById('regInput').value = savedReg;
                lookupStudent(); // Automatically load their profile
            }
        };

        async function lookupStudent() {
            const regInput = document.getElementById('regInput');
            const regNumber = regInput.value.trim();
            const errorDisplay = document.getElementById('errorDisplay');
            const profileSection = document.getElementById('profileSection');

            if (!regNumber) return;

            try {
                const res = await fetch(`${API_BASE}/student/${encodeURIComponent(regNumber)}`);
                const data = await res.json();

                if (res.ok) {
                    displayProfile(data, regNumber);
                    errorDisplay.classList.add('hidden');
                } else {
                    errorDisplay.classList.remove('hidden');
                    profileSection.classList.add('hidden');
                }
            } catch (err) {
                console.error("Connection Error:", err);
                errorDisplay.innerText = "Connection Error. Ensure backend is live.";
                errorDisplay.classList.remove('hidden');
                profileSection.classList.add('hidden');
            }
        }

        function displayProfile(data, regNumber) {
            document.getElementById('studentName').innerText = data.name;
            document.getElementById('studentReg').innerText = 'Registration: ' + regNumber;

            const feeStatus = document.getElementById('feeStatus');
            if (data.fee_status === 1) {
                feeStatus.innerText = 'Cleared';
                feeStatus.className = 'px-4 py-2 rounded-full text-sm font-bold uppercase bg-green-100 text-green-800 border border-green-600';
            } else {
                feeStatus.innerText = 'Pending';
                feeStatus.className = 'px-4 py-2 rounded-full text-sm font-bold uppercase bg-red-100 text-red-800 border border-red-600';
            }

            const tapsList = document.getElementById('tapsList');
            if (data.logs && data.logs.length > 0) {
                tapsList.innerHTML = data.logs.map(log => `
                    <div class="flex items-center justify-between p-3 rounded bg-gray-50 border-l-4 ${log.status === 'Access Granted' ? 'border-green-600' : 'border-red-600'} animate-reveal">
                        <div>
                            <p class="text-[10px] font-bold text-tuk-green">${new Date(log.access_time).toLocaleString()}</p>
                        </div>
                        <span class="text-[10px] font-black px-2 py-1 rounded border ${log.status === 'Access Granted' ? 'border-green-600 text-green-600' : 'border-red-600 text-red-600'} uppercase">
                            ${log.status === 'Access Granted' ? 'Granted' : 'Denied'}
                        </span>
                    </div>
                `).join('');
            } else {
                tapsList.innerHTML = '<p class="text-center text-gray-400 italic text-sm py-10">No taps found.</p>';
            }

            document.getElementById('profileSection').classList.remove('hidden');
        }
    </script>
