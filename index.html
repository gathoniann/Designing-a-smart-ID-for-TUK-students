<script>
        async function handleLogin() {
            const role = document.getElementById('role').value;
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorElement = document.getElementById('errorMessage');

            // Hide error message initially
            errorElement.classList.add('hidden');

            if (!username || !password) {
                errorElement.innerText = "Please fill in all fields.";
                errorElement.classList.remove('hidden');
                return;
            }

            // PROTOTYPE LOGIC FOR DEFENSE:
            // In a production environment, you would use: 
            // await fetch('https://designing-a-smart-id-for-tuk-students.onrender.com/login', ...)
            
            if (role === 'admin' && password === 'admin123') {
                // Store username for the session so the admin page knows who is logged in
                sessionStorage.setItem('adminUser', username);
                window.location.href = 'admin.html'; 
            } else if (role === 'student' && password === 'student123') {
                // Store the Reg No so the student portal knows which data to fetch from Render
                sessionStorage.setItem('regNumber', username);
                window.location.href = 'student.html'; 
            } else {
                errorElement.innerText = "Invalid credentials. Access Denied.";
                errorElement.classList.remove('hidden');
            }
        }
    </script>
