<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUK Smart ID | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .tuk-green { background-color: #006400; }
        .text-tuk-green { color: #006400; }
        .border-tuk-green { border-color: #006400; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col justify-center items-center p-4">

    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden border border-gray-200">
        
        <div class="tuk-green p-8 text-center flex flex-col items-center">
            <img src="https://www.tukenya.ac.ke/sites/default/files/logo_0.png" alt="TUK Logo" class="h-20 w-auto mb-4 bg-white p-2 rounded-lg">
            <h1 class="text-2xl font-bold text-white uppercase tracking-tight">Smart ID Portal</h1>
            <p class="text-green-200 text-sm font-semibold uppercase tracking-widest mt-1">Authentication Required</p>
        </div>

        <div class="p-8 space-y-6">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">User Role</label>
                <select id="role" class="w-full bg-gray-50 border-2 border-gray-300 rounded-lg p-3 text-gray-700 focus:border-tuk-green focus:ring-0 outline-none">
                    <option value="student">Student</option>
                    <option value="admin">Security / Admin</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Registration No. / Staff ID</label>
                <input type="text" id="username" placeholder="e.g., AIIM/00476/2021" 
                       class="w-full bg-gray-50 border-2 border-gray-300 rounded-lg p-3 focus:border-tuk-green focus:ring-0 outline-none uppercase text-gray-800">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Password</label>
                <input type="password" id="password" placeholder="••••••••" 
                       class="w-full bg-gray-50 border-2 border-gray-300 rounded-lg p-3 focus:border-tuk-green focus:ring-0 outline-none text-gray-800">
            </div>

            <button onclick="handleLogin()" 
                    class="w-full tuk-green text-white py-4 rounded-lg font-bold text-lg uppercase hover:bg-green-800 transition-colors shadow-md mt-4">
                Secure Login
            </button>
            
            <p id="errorMessage" class="text-red-500 text-sm font-bold text-center hidden">Invalid credentials. Please try again.</p>
        </div>
    </div>

    <script>
        function handleLogin() {
            const role = document.getElementById('role').value;
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                document.getElementById('errorMessage').innerText = "Please fill in all fields.";
                document.getElementById('errorMessage').classList.remove('hidden');
                return;
            }

            // In a real system, you would fetch() to your backend /login route here.
            // For the prototype routing:
            if (role === 'admin' && password === 'admin123') {
                window.location.href = 'admin.html'; // Goes to your security terminal
            } else if (role === 'student' && password === 'student123') {
                window.location.href = 'student.html'; // Goes to the student view
            } else {
                document.getElementById('errorMessage').innerText = "Invalid credentials.";
                document.getElementById('errorMessage').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
