<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUK Smart ID | Merchant POS Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .tuk-green { background-color: #006400; } 
        .text-tuk-green { color: #006400; }
        .border-tuk-green { border-color: #006400; }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-reveal { animation: slideUp 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800">

    <!-- ── HEADER ─────────────────────────────────────────────────── -->
    <header class="bg-white border-b-4 border-tuk-green shadow-md mb-8">
        <div class="max-w-6xl mx-auto px-4 py-3 flex flex-col md:flex-row justify-between items-center">
            <div class="flex items-center gap-4">
                <img src="https://www.tukenya.ac.ke/sites/default/files/logo_0.png" alt="TUK Logo" class="h-16 w-auto">
                <div>
                    <h1 class="text-xl md:text-2xl font-bold text-tuk-green uppercase tracking-tight">Technical University of Kenya</h1>
                    <p class="text-xs font-semibold text-gray-500 uppercase tracking-widest">Merchant POS & Top-Up Terminal</p>
                    <div class="flex items-center gap-3 mt-1">
                        <a href="admin.html" class="text-tuk-green hover:text-green-800 text-xs font-semibold underline">← Security Terminal</a>
                        <span class="text-gray-300">|</span>
                        <a href="student.html" class="text-tuk-green hover:text-green-800 text-xs font-semibold underline">My ID Dashboard →</a>
                        <span class="text-gray-300">|</span>
                        <button onclick="logout()" class="text-red-500 hover:text-red-800 text-xs font-semibold underline">Sign Out</button>
                    </div>
                </div>
            </div>
            <div class="text-center md:text-right mt-4 md:mt-0">
                <div id="clock" class="text-2xl font-bold text-gray-700">00:00:00</div>
                <p id="current-date" class="text-xs font-bold text-tuk-green uppercase">Saturday, May 9, 2026</p>
            </div>
        </div>
    </header>

    <!-- ── MAIN CONTENT ───────────────────────────────────────────── -->
    <main class="max-w-6xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-12 gap-8 pb-12">
        
        <!-- Left Side: POS Actions -->
        <div class="lg:col-span-7 space-y-6">
            
            <!-- Terminal Output / Message Panel -->
            <div id="statusBanner" class="hidden p-4 rounded-lg border-2 text-center font-bold text-sm animate-reveal"></div>

            <!-- TAB CONTAINER -->
            <div class="bg-white rounded-lg shadow-lg border border-gray-200 overflow-hidden">
                <div class="flex border-b border-gray-200 bg-gray-50">
                    <button onclick="switchTab('charge')" id="tab-charge" class="flex-1 py-4 text-center font-bold text-sm text-tuk-green border-b-2 border-tuk-green">
                        💳 Deduct Funds (NFC Tap)
                    </button>
                    <button onclick="switchTab('topup')" id="tab-topup" class="flex-1 py-4 text-center font-bold text-sm text-gray-400 border-b-2 border-transparent">
                        💰 Wallet Top-Up
                    </button>
                </div>

                <!-- Tab 1: Charge Wallet -->
                <div id="chargeSection" class="p-8 space-y-6">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Service Point</label>
                            <select id="servicePoint" class="w-full bg-gray-50 border border-gray-300 rounded p-3 outline-none focus:border-tuk-green focus:bg-white text-sm font-semibold">
                                <option value="Student Cafeteria">Student Cafeteria</option>
                                <option value="Library Printing">Library Printing</option>
                                <option value="TUK Bookshop">TUK Bookshop</option>
                                <option value="Campus Laundry">Campus Laundry</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Bill Amount (KES)</label>
                            <input type="number" id="chargeAmount" placeholder="0.00" step="0.01" min="0.01"
                                   class="w-full bg-gray-50 border border-gray-300 rounded p-3 outline-none focus:border-tuk-green focus:bg-white text-sm font-semibold">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Scan Student ID / Enter UID</label>
                        <input type="text" id="chargeNfc" placeholder="Tap NFC card to verify..." autofocus
                               class="w-full bg-gray-50 border-2 border-gray-300 rounded p-4 text-2xl font-mono focus:border-tuk-green focus:bg-white transition-all outline-none text-center uppercase tracking-wider">
                    </div>

                    <button onclick="processCharge()" 
                            class="w-full tuk-green text-white py-4 rounded font-bold text-lg uppercase hover:bg-green-800 transition-colors shadow-md">
                        Deduct Wallet Funds
                    </button>
                </div>

                <!-- Tab 2: Top-Up Wallet -->
                <div id="topupSection" class="p-8 space-y-6 hidden">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Student Reg Number</label>
                            <input type="text" id="topupReg" placeholder="e.g. AIIM/00476/2022"
                                   class="w-full bg-gray-50 border border-gray-300 rounded p-3 outline-none focus:border-tuk-green focus:bg-white text-sm font-semibold uppercase">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Deposit Amount (KES)</label>
                            <input type="number" id="topupAmount" placeholder="0.00" step="0.01" min="1.00"
                                   class="w-full bg-gray-50 border border-gray-300 rounded p-3 outline-none focus:border-tuk-green focus:bg-white text-sm font-semibold">
                        </div>
                    </div>

                    <button onclick="processTopUp()" 
                            class="w-full bg-blue-700 text-white py-4 rounded font-bold text-lg uppercase hover:bg-blue-800 transition-colors shadow-md">
                        Complete Wallet Top-Up
                    </button>
                </div>
            </div>

        </div>

        <!-- Right Side: Recent Transactions Feed -->
        <div class="lg:col-span-5">
            <div class="bg-white rounded-lg shadow-lg border border-gray-200 h-full flex flex-col">
                <div class="bg-gray-50 border-b border-gray-200 p-4">
                    <div class="flex justify-between items-center">
                        <h2 class="text-tuk-green font-bold uppercase text-sm">Recent Transactions</h2>
                        <span class="animate-pulse flex items-center gap-1">
                            <span class="h-2 w-2 bg-green-500 rounded-full"></span>
                            <span class="text-[10px] font-bold text-gray-400 uppercase">Live Feed</span>
                        </span>
                    </div>
                </div>

                <div id="transactionFeed" class="p-4 space-y-3 overflow-y-auto max-h-[500px] flex-grow">
                    <p class="text-center text-gray-400 italic text-sm py-10">Awaiting transactions...</p>
                </div>

                <div class="p-3 bg-gray-50 border-t border-gray-200 text-[10px] text-gray-400 text-center font-bold uppercase tracking-widest">
                    Displaying last 10 campus events
                </div>
            </div>
        </div>

    </main>

    <footer class="text-center py-8 text-[11px] text-gray-400 font-medium uppercase tracking-widest border-t border-gray-200 mt-12 bg-white">
        TUK Smart ID System &copy; 2026 — Technical University of Kenya
    </footer>

    <script>
        // ── Auth guard ────────────────────────────────────────────────────────
        const token = sessionStorage.getItem('adminToken');
        if (!token) {
            window.location.href = 'index.html';
        }

        // ─── API Configuration ────────────────────────────────────────────────
        const API_BASE = 'https://designing-a-smart-id-for-tuk-students.onrender.com';
        // ─────────────────────────────────────────────────────────────────────

        function logout() {
            sessionStorage.clear();
            window.location.href = 'index.html';
        }

        let activeTab = 'charge';

        // Initialize clock
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('en-GB', {
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
        });

        // Switch Tabs
        function switchTab(tab) {
            activeTab = tab;
            const isCharge = tab === 'charge';

            document.getElementById('tab-charge').className = `flex-1 py-4 text-center font-bold text-sm transition-all ${isCharge ? 'text-tuk-green border-b-2 border-tuk-green' : 'text-gray-400 border-b-2 border-transparent'}`;
            document.getElementById('tab-topup').className = `flex-1 py-4 text-center font-bold text-sm transition-all ${!isCharge ? 'text-blue-700 border-b-2 border-blue-700' : 'text-gray-400 border-b-2 border-transparent'}`;

            document.getElementById('chargeSection').classList.toggle('hidden', !isCharge);
            document.getElementById('topupSection').classList.toggle('hidden', isCharge);
            
            document.getElementById('statusBanner').className = 'hidden';

            if (isCharge) {
                document.getElementById('chargeNfc').focus();
            } else {
                document.getElementById('topupReg').focus();
            }
        }

        // Show Feedback Banner
        function showFeedback(message, type = 'success') {
            const banner = document.getElementById('statusBanner');
            banner.innerText = message;
            banner.classList.remove('hidden');
            
            if (type === 'success') {
                banner.className = 'p-4 rounded-lg border-2 text-center font-bold text-sm animate-reveal bg-green-50 border-green-600 text-green-700';
            } else {
                banner.className = 'p-4 rounded-lg border-2 text-center font-bold text-sm animate-reveal bg-red-50 border-red-600 text-red-700';
            }
        }

        // Process a Payment Charge
        async function processCharge() {
            const servicePoint = document.getElementById('servicePoint').value;
            const amount = document.getElementById('chargeAmount').value.trim();
            const nfcUid = document.getElementById('chargeNfc').value.trim();

            if (!amount || !nfcUid) {
                return showFeedback('⚠️ Please specify both amount and student UID.', 'error');
            }

            try {
                const res = await fetch(`${API_BASE}/pay`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + sessionStorage.getItem('adminToken')
                    },
                    body: JSON.stringify({ nfc_uid: nfcUid, amount, service_point: servicePoint })
                });

                if (res.status === 401 || res.status === 403) {
                    return logout();
                }

                const data = await res.json();

                if (res.ok && data.success) {
                    showFeedback(`✅ Deducted KES ${parseFloat(amount).toFixed(2)} for ${data.student_name}. Remaining: KES ${parseFloat(data.new_balance).toFixed(2)}`, 'success');
                    document.getElementById('chargeAmount').value = '';
                    document.getElementById('chargeNfc').value = '';
                    updateTransactions();
                } else {
                    showFeedback(`❌ Payment Failed: ${data.message || 'Verification Error'}`, 'error');
                }
            } catch (err) {
                console.error(err);
                showFeedback('⚠️ Connection error. Please ensure the backend is running.', 'error');
            }
        }

        // Process a Wallet Top-Up
        async function processTopUp() {
            const regNumber = document.getElementById('topupReg').value.trim().toUpperCase();
            const amount = document.getElementById('topupAmount').value.trim();

            if (!regNumber || !amount) {
                return showFeedback('⚠️ Please specify both Registration Number and amount.', 'error');
            }

            try {
                const res = await fetch(`${API_BASE}/topup`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + sessionStorage.getItem('adminToken')
                    },
                    body: JSON.stringify({ reg_number: regNumber, amount })
                });

                if (res.status === 401 || res.status === 403) {
                    return logout();
                }

                const data = await res.json();

                if (res.ok && data.success) {
                    showFeedback(`✅ Credited KES ${parseFloat(amount).toFixed(2)} to ${data.student_name}. New Balance: KES ${parseFloat(data.new_balance).toFixed(2)}`, 'success');
                    document.getElementById('topupReg').value = '';
                    document.getElementById('topupAmount').value = '';
                    updateTransactions();
                } else {
                    showFeedback(`❌ Top-Up Failed: ${data.message || 'Record not found.'}`, 'error');
                }
            } catch (err) {
                console.error(err);
                showFeedback('⚠️ Connection error. Please ensure the backend is running.', 'error');
            }
        }

        // Load & Update Recent Transactions
        async function updateTransactions() {
            try {
                const res = await fetch(`${API_BASE}/transactions`, {
                    headers: {
                        'Authorization': 'Bearer ' + sessionStorage.getItem('adminToken')
                    }
                });

                if (res.status === 401 || res.status === 403) {
                    return logout();
                }

                const txs = await res.json();
                const feed = document.getElementById('transactionFeed');

                if (txs && txs.length > 0) {
                    feed.innerHTML = txs.map(tx => {
                        const isCredit = tx.transaction_type === 'CREDIT';
                        const colorClass = isCredit ? 'border-green-600' : 'border-red-600';
                        const badgeClass = isCredit ? 'border-green-600 text-green-600' : 'border-red-600 text-red-600';
                        const sign = isCredit ? '+' : '-';
                        const dateStr = new Date(tx.transaction_time).toLocaleTimeString();

                        return `
                            <div class="flex items-center justify-between p-3 rounded bg-gray-50 border-l-4 ${colorClass}">
                                <div>
                                    <p class="font-bold text-xs uppercase text-gray-700">${tx.student_name}</p>
                                    <p class="text-[10px] text-gray-400 font-semibold">${tx.service_point} &bull; ${dateStr}</p>
                                </div>
                                <span class="text-[10px] font-black px-2 py-1 rounded border bg-white ${badgeClass} uppercase">
                                    ${sign}KES ${parseFloat(tx.amount).toFixed(2)}
                                </span>
                            </div>
                        `;
                    }).join('');
                } else {
                    feed.innerHTML = '<p class="text-center text-gray-400 italic text-sm py-10">No transactions recorded.</p>';
                }
            } catch (err) {
                console.warn("Transactions feed failed to load.");
            }
        }

        // Allow Enter key to trigger charge/top-up
        document.getElementById('chargeNfc').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') processCharge();
        });

        // ─── Real-Time Live Feed (SSE) ──────────────────────────────────────────
        function initSseLiveFeed() {
            const sseToken = sessionStorage.getItem('adminToken');
            if (!sseToken) return;

            const sse = new EventSource(`${API_BASE}/events?token=${encodeURIComponent(sseToken)}`);

            sse.onmessage = (e) => {
                try {
                    const payload = JSON.parse(e.data);
                    if (payload.type === 'transaction') {
                        prependTransactionEntry(payload.data);
                    }
                } catch (err) {
                    console.error("SSE parsing error:", err);
                }
            };

            sse.onerror = (err) => {
                console.warn("SSE connection interrupted. Reconnecting...");
            };
        }

        function prependTransactionEntry(tx) {
            const feed = document.getElementById('transactionFeed');
            
            // Remove placeholder if present
            if (feed.querySelector('p.italic')) {
                feed.innerHTML = '';
            }

            const isCredit = tx.transaction_type === 'CREDIT';
            const colorClass = isCredit ? 'border-green-600' : 'border-red-600';
            const badgeClass = isCredit ? 'border-green-600 text-green-600' : 'border-red-600 text-red-600';
            const sign = isCredit ? '+' : '-';
            const dateStr = new Date(tx.transaction_time).toLocaleTimeString();

            const newTxHtml = `
                <div class="flex items-center justify-between p-3 rounded bg-gray-50 border-l-4 ${colorClass} animate-reveal" style="animation-name: slideUp; animation-duration: 0.3s; animation-fill-mode: forwards;">
                    <div>
                        <p class="font-bold text-xs uppercase text-gray-700">${tx.student_name}</p>
                        <p class="text-[10px] text-gray-400 font-semibold">${tx.service_point} &bull; ${dateStr}</p>
                    </div>
                    <span class="text-[10px] font-black px-2 py-1 rounded border bg-white ${badgeClass} uppercase">
                        ${sign}KES ${parseFloat(tx.amount).toFixed(2)}
                    </span>
                </div>
            `;

            feed.insertAdjacentHTML('afterbegin', newTxHtml);

            // Keep maximum of 10 items
            const entries = feed.children;
            if (entries.length > 10) {
                feed.removeChild(entries[entries.length - 1]);
            }
        }

        // Initialize Transactions
        updateTransactions();
        initSseLiveFeed();
    </script>
</body>
</html>
